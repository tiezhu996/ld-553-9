server {
  listen 38403;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:38503/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /health {
    return 200 "ok";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
